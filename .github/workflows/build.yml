name: Build

on:
  push:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Wires ~/.m2/settings.xml with a <server> block matching the
          # github-jqa-template-report repository id from pom.xml. The default
          # env-var names (GITHUB_ACTOR / GITHUB_TOKEN) are auto-provided by
          # GitHub Actions, so no extra secrets are needed.
          server-id: github-jqa-template-report

      - name: Build and test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Publish test results
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
